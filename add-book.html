<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Book Exchange System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom py-3">
                        <h4 class="card-title m-0"><i class='bx bx-book-add text-primary'></i> List a Book for Exchange</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="addBookForm">
                            <div class="mb-3">
                                <label for="bookTitle" class="form-label fw-medium">Book Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="bookTitle" required placeholder="e.g. Clean Code">
                            </div>

                            <div class="mb-3">
                                <label for="bookAuthor" class="form-label fw-medium">Author(s) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="bookAuthor" required placeholder="e.g. Robert C. Martin">
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="bookCategory" class="form-label fw-medium">Category <span class="text-danger">*</span></label>
                                    <select class="form-select" id="bookCategory" required>
                                        <option value="" disabled selected>Select category</option>
                                        <option value="Programming">Programming</option>
                                        <option value="Science">Science</option>
                                        <option value="Engineering">Engineering</option>
                                        <option value="Mathematics">Mathematics</option>
                                        <option value="Literature">Literature</option>
                                        <option value="History">History</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="bookCondition" class="form-label fw-medium">Condition <span class="text-danger">*</span></label>
                                    <select class="form-select" id="bookCondition" required>
                                        <option value="Like New">Like New</option>
                                        <option value="Excellent">Excellent</option>
                                        <option value="Good" selected>Good</option>
                                        <option value="Fair">Fair</option>
                                        <option value="Poor">Poor</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="bookDescription" class="form-label fw-medium">Description (Optional)</label>
                                <textarea class="form-control" id="bookDescription" rows="3" placeholder="Briefly describe the book or note any defects..."></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="bookImage" class="form-label fw-medium">Cover Image URL (Optional)</label>
                                <input type="url" class="form-control" id="bookImage" placeholder="https://example.com/book-cover.jpg">
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-light" onclick="window.history.back()">Cancel</button>
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <i class='bx bx-plus'></i> Add Book
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/books.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.requireAuth();

            const form = document.getElementById('addBookForm');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const title = document.getElementById('bookTitle').value;
                const author = document.getElementById('bookAuthor').value;
                const category = document.getElementById('bookCategory').value;
                const condition = document.getElementById('bookCondition').value;
                const description = document.getElementById('bookDescription').value;
                const image = document.getElementById('bookImage').value;

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Adding...';

                setTimeout(() => {
                    const result = Books.add({
                        title, author, category, condition, description, image
                    });

                    if (result.success) {
                        UI.showToast('Success', result.message, 'success');
                        form.reset();
                        setTimeout(() => {
                            window.location.href = 'my-books.html';
                        }, 1500);
                    } else {
                        UI.showToast('Error', result.message, 'danger');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = "<i class='bx bx-plus'></i> Add Book";
                    }
                }, 500);
            });
        });
    </script>
</body>
</html>

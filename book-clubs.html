<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Book Clubs - Book Exchange System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <script>
        const savedTheme = localStorage.getItem('book_exchange_theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body>

    <div id="navbar-container"></div>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="m-0"><i class='bx bx-coffee text-warning'></i> Virtual Book Clubs</h2>
                <p class="text-muted m-0">Join a club, participate in discussions, and read together.</p>
            </div>
            <button class="btn btn-outline-primary" onclick="UI.showToast('Coming Soon', 'Group creation will be available in the next update.', 'info')">
                <i class='bx bx-plus'></i> Start a Club
            </button>
        </div>

        <div class="row g-4" id="clubsContainer"></div>

    </main>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('clubsContainer');
            
            // Hardcoded demo clubs
            const clubs = [
                {
                    id: 1,
                    name: "The Sci-Fi Enthusiasts",
                    desc: "Exploring parallel universes, space operas, and dystopian futures.",
                    members: 142,
                    book: "Dune by Frank Herbert",
                    tag: "Science Fiction",
                    color: "info"
                },
                {
                    id: 2,
                    name: "Code Crafters",
                    desc: "A group for developers looking to share tech wisdom and read programming classics.",
                    members: 89,
                    book: "Clean Code",
                    tag: "Technology",
                    color: "primary"
                },
                {
                    id: 3,
                    name: "History Buffs",
                    desc: "Discussing non-fiction accounts of historical events and ancient philosophies.",
                    members: 56,
                    book: "Sapiens",
                    tag: "History",
                    color: "success"
                },
                {
                    id: 4,
                    name: "Mystery Hour",
                    desc: "Whodunit? We read thrillers, mysteries, and deep psychological suspenses.",
                    members: 110,
                    book: "Gone Girl",
                    tag: "Mystery",
                    color: "danger"
                }
            ];

            // Render clubs
            clubs.forEach(club => {
                container.innerHTML += `
                    <div class="col-md-6">
                        <div class="card h-100 border-0 shadow-sm card-hover">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="bg-${club.color} bg-opacity-10 text-${club.color} rounded p-3 d-flex align-items-center justify-content-center">
                                            <i class='bx bx-group fs-2'></i>
                                        </div>
                                        <div>
                                            <h5 class="card-title mb-1 fw-bold">${club.name}</h5>
                                            <span class="badge bg-light text-dark border border-secondary">${club.tag}</span>
                                        </div>
                                    </div>
                                    <span class="text-muted small"><i class='bx bx-user'></i> ${club.members} Members</span>
                                </div>
                                <p class="card-text text-muted mb-4">${club.desc}</p>
                                <div class="bg-light p-3 rounded mb-4 d-flex align-items-center gap-2 border">
                                    <i class='bx bx-book-open text-primary fs-4'></i>
                                    <div>
                                        <small class="text-muted d-block">Currently Reading</small>
                                        <strong class="text-dark">${club.book}</strong>
                                    </div>
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-outline-${club.color} join-btn" data-id="${club.id}">Join Club</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Handle Join actions
            document.querySelectorAll('.join-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(!Auth.isLoggedIn()) {
                        UI.showToast('Authentication Required', 'Please log in to join a book club.', 'warning');
                        return;
                    }
                    
                    const el = e.currentTarget;
                    if(el.classList.contains('joined')) {
                        el.innerHTML = 'Join Club';
                        el.classList.remove('joined', 'btn-success');
                        el.classList.add('btn-outline-' + clubs.find(c=>c.id==el.dataset.id).color);
                        UI.showToast('Club Left', 'You left the book club.', 'info');
                    } else {
                        el.innerHTML = '<i class="bx bx-check"></i> Joined successfully';
                        el.className = 'btn btn-success join-btn joined';
                        UI.showToast('Welcome!', 'You have successfully joined the book club. Check back later for discussion threads!', 'success');
                    }
                });
            });
        });
    </script>
</body>
</html>

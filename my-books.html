<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Books - Book Exchange System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class='bx bx-library text-primary'></i> My Books</h2>
            <a href="add-book.html" class="btn btn-primary"><i class='bx bx-plus'></i> Add New Book</a>
        </div>

        <div class="row g-4" id="myBooksContainer">
            <!-- Rendered dynamically -->
        </div>

    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/books.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.requireAuth();
            const currentUser = Auth.getCurrentUser();
            const container = document.getElementById('myBooksContainer');

            const renderMyBooks = () => {
                const myBooks = Books.getByOwner(currentUser.id);
                container.innerHTML = '';

                if (myBooks.length === 0) {
                    container.innerHTML = `
                        <div class="col-12">
                            <div class="empty-state">
                                <i class='bx bx-book-open'></i>
                                <h4>You haven't added any books yet</h4>
                                <p>List your first book to start exchanging with others.</p>
                                <a href="add-book.html" class="btn btn-primary mt-2">Add a Book</a>
                            </div>
                        </div>
                    `;
                    return;
                }

                myBooks.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4 col-xl-3';
                    
                    let statusBadge = '';
                    if (book.status === 'available') statusBadge = '<span class="badge bg-success">Available</span>';
                    else if (book.status === 'pending_exchange') statusBadge = '<span class="badge bg-warning text-dark">Pending</span>';
                    else if (book.status === 'exchanged') statusBadge = '<span class="badge bg-secondary">Exchanged</span>';

                    card.innerHTML = `
                        <div class="card h-100">
                            ${book.image ? `<img src="${book.image}" class="card-img-top" alt="${book.title}" style="height: 200px; object-fit: cover;">` : `
                            <div class="book-cover-placeholder">
                                <i class='bx bx-book'></i>
                            </div>
                            `}
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="card-title text-truncate mb-0" title="${book.title}">${book.title}</h5>
                                </div>
                                <h6 class="card-subtitle mb-2 text-muted text-truncate" title="${book.author}">${book.author}</h6>
                                <div class="mb-2">
                                    ${statusBadge}
                                    <span class="badge bg-light text-dark border border-secondary">${book.category}</span>
                                </div>
                                
                                <div class="mt-auto pt-3 border-top d-flex gap-2">
                                    <button class="btn btn-sm btn-outline-danger flex-grow-1 delete-btn" data-id="${book.id}" ${book.status !== 'available' ? 'disabled' : ''}>
                                        <i class='bx bx-trash'></i> Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Attach delete handlers
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        if (confirm('Are you sure you want to delete this book?')) {
                            const res = Books.delete(id);
                            if (res.success) {
                                UI.showToast('Deleted', res.message, 'success');
                                renderMyBooks();
                            } else {
                                UI.showToast('Error', res.message, 'danger');
                            }
                        }
                    });
                });
            };

            renderMyBooks();
        });
    </script>
</body>
</html>

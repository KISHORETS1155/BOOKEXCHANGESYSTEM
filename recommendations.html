<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recommendations - Book Exchange System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Init theme early
        const savedTheme = localStorage.getItem('book_exchange_theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body>

    <div id="navbar-container"></div>

    <main class="container py-5">
        <div class="d-flex align-items-center mb-2 gap-3">
            <h2 class="m-0"><i class='bx bx-chip text-primary fs-1'></i> Smart Recommendations</h2>
            <span class="badge bg-primary bg-opacity-10 text-primary border border-primary">Powered by SimAI</span>
        </div>
        <p class="text-muted mb-5 fs-5">Our advanced (simulated) heuristic engine analyzed your reading history and community trends to find these perfect matches.</p>

        <div class="row g-4" id="recommendationsContainer">
            <!-- Loader -->
            <div class="col-12 text-center py-5" id="recLoader">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <h4 class="mt-3 text-muted" id="loadingText">Analyzing community graphs...</h4>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/books.js"></script>
    <script src="js/exchange.js"></script>
    <script src="js/ui.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('recommendationsContainer');
            const loadingText = document.getElementById('loadingText');
            
            // Fake progression to build anticipation
            setTimeout(() => { loadingText.textContent = "Calculating cosine similarity..."; }, 1000);
            setTimeout(() => { loadingText.textContent = "Ranking top matches..."; }, 2000);

            setTimeout(() => {
                container.innerHTML = '';
                
                const currentUser = Auth.getCurrentUser();
                let availableBooks = Books.getAvailable();
                
                // Exclude own books
                if (currentUser) {
                    availableBooks = availableBooks.filter(b => b.ownerId !== currentUser.id);
                }

                if (availableBooks.length === 0) {
                    container.innerHTML = `<div class="col-12"><div class="empty-state"><h3>No books available right now to recommend.</h3></div></div>`;
                    return;
                }

                // Shuffle and pick top 3 or 4
                availableBooks.sort(() => 0.5 - Math.random());
                const selected = availableBooks.slice(0, Math.min(4, availableBooks.length));

                selected.forEach((book, index) => {
                    // Generate a fake high match score
                    const matchScore = 98 - Math.floor(Math.random() * 8);
                    
                    container.innerHTML += `
                        <div class="col-md-6 col-lg-3">
                            <div class="card h-100 card-hover shadow-sm border-0 position-relative overflow-hidden">
                                <div class="position-absolute top-0 end-0 bg-success text-white px-3 py-1 fw-bold rounded-bottom-start shadow-sm z-1">
                                    ${matchScore}% Match
                                </div>
                                ${book.image ? `<img src="${book.image}" class="card-img-top" alt="${book.title}" style="height: 200px; object-fit: cover;">` : `
                                <div class="book-cover-placeholder">
                                    <i class='bx bx-book'></i>
                                </div>
                                `}
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title text-truncate mb-1" title="${book.title}">${book.title}</h5>
                                    <p class="card-text text-muted small mb-3 text-truncate">${book.author}</p>
                                    <p class="card-text small text-truncate" style="-webkit-line-clamp: 2; -webkit-box-orient: vertical; display: -webkit-box;">${book.description}</p>
                                    <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
                                        <span class="badge bg-light text-dark border border-secondary">${book.category}</span>
                                        <button class="btn btn-sm btn-outline-primary request-btn" data-book-id="${book.id}">Request</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }, 3000);
        });
    </script>
</body>
</html>

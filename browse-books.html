<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - Book Exchange System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Placeholder for Navbar -->
    <div id="navbar-container"></div>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class='bx bx-search-alt text-primary'></i> Browse Books</h2>
            <a href="add-book.html" class="btn btn-primary d-none" id="addBookBtnNavbar"><i class='bx bx-plus'></i> Add Book</a>
        </div>

        <!-- Search and Filter Section -->
        <div class="card mb-4">
            <div class="card-body">
                <form id="searchForm" class="row g-3">
                    <div class="col-md-7">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class='bx bx-search'></i></span>
                            <input type="text" class="form-control" id="searchInput" placeholder="Search by title, author, or keyword...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select id="categoryFilter" class="form-select">
                            <option value="All">All Categories</option>
                            <!-- Dynamic categories -->
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsCount" class="text-muted mb-3">Loading books...</div>
        
        <div class="row g-4" id="booksContainer">
            <!-- Book cards will be rendered here dynamically -->
        </div>

    </main>

    <!-- Placeholder for Footer -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/books.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = Auth.getCurrentUser();
            if (currentUser) {
                document.getElementById('addBookBtnNavbar').classList.remove('d-none');
            }

            const searchInput = document.getElementById('searchInput');
            const categoryFilter = document.getElementById('categoryFilter');
            const searchForm = document.getElementById('searchForm');
            const booksContainer = document.getElementById('booksContainer');
            const resultsCount = document.getElementById('resultsCount');

            // Populate categories
            const populateCategories = () => {
                const categories = Books.getCategories();
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categoryFilter.appendChild(option);
                });
            };

            // Render books
            const renderBooks = (booksToRender) => {
                booksContainer.innerHTML = '';
                
                // Exclude current user's own books from browsing pool
                const filteredBooks = currentUser 
                    ? booksToRender.filter(b => b.ownerId !== currentUser.id)
                    : booksToRender;

                resultsCount.textContent = `Showing ${filteredBooks.length} available books`;

                if (filteredBooks.length === 0) {
                    booksContainer.innerHTML = `
                        <div class="col-12">
                            <div class="empty-state">
                                <i class='bx bx-book-open'></i>
                                <h4>No books found</h4>
                                <p>Try adjusting your search criteria.</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                filteredBooks.forEach(book => {
                    const owner = Database.findById(DB_KEYS.USERS, book.ownerId);
                    const ownerName = owner ? owner.name : 'Unknown User';
                    
                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4 col-xl-3';
                    card.innerHTML = `
                        <div class="card h-100 card-hover">
                            ${book.image ? `<img src="${book.image}" class="card-img-top" alt="${book.title}" style="height: 200px; object-fit: cover;">` : `
                            <div class="book-cover-placeholder">
                                <i class='bx bx-book'></i>
                            </div>
                            `}
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title text-truncate" title="${book.title}">${book.title}</h5>
                                <h6 class="card-subtitle mb-2 text-muted text-truncate" title="${book.author}">${book.author}</h6>
                                <div class="mb-2">
                                    <span class="badge bg-secondary">${book.category}</span>
                                    <span class="badge bg-light text-dark border border-secondary">${book.condition}</span>
                                </div>
                                <p class="card-text small flex-grow-1 text-truncate" style="-webkit-line-clamp: 3; -webkit-box-orient: vertical; display: -webkit-box;">${book.description}</p>
                                <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                                    <small class="text-muted"><i class='bx bx-user'></i> ${ownerName}</small>
                                    <button class="btn btn-sm btn-outline-primary request-btn" data-book-id="${book.id}">
                                        Request
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    booksContainer.appendChild(card);
                });

                // Attach request event listeners
                document.querySelectorAll('.request-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (!currentUser) {
                            UI.showToast('Please Login', 'You must be logged in to request a book.', 'warning');
                            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                            return;
                        }
                        
                        const bookId = e.target.getAttribute('data-book-id');
                        // Call exchange logic here (will implement in next step)
                        // For now, save to local storage flag to simulate
                        // Ex: Exchange.requestBook(bookId);
                        UI.showToast('Request Logic', 'Will be implemented in Exchange module.', 'info');
                    });
                });
            };

            // Initial load
            populateCategories();
            renderBooks(Books.getAvailable());

            // Handle Search
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = searchInput.value;
                const category = categoryFilter.value;
                const results = Books.search(query, { category });
                renderBooks(results);
            });
            
            // Live Search
            searchInput.addEventListener('input', () => {
                const query = searchInput.value;
                const category = categoryFilter.value;
                const results = Books.search(query, { category });
                renderBooks(results);
            });
            
            categoryFilter.addEventListener('change', () => {
                const query = searchInput.value;
                const category = categoryFilter.value;
                const results = Books.search(query, { category });
                renderBooks(results);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Book Exchange System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-stat {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .admin-stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <main class="container py-5">
        <h2 class="mb-4 text-danger"><i class='bx bx-shield-quarter'></i> System Administration</h2>

        <!-- Stats Row -->
        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="admin-stat">
                    <div class="admin-stat-icon bg-primary bg-opacity-10 text-primary">
                        <i class='bx bx-group'></i>
                    </div>
                    <div>
                        <h3 class="mb-0" id="statUsers">0</h3>
                        <p class="text-muted mb-0 small">Total Users</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="admin-stat">
                    <div class="admin-stat-icon bg-info bg-opacity-10 text-info">
                        <i class='bx bx-book'></i>
                    </div>
                    <div>
                        <h3 class="mb-0" id="statBooks">0</h3>
                        <p class="text-muted mb-0 small">Total Books</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="admin-stat">
                    <div class="admin-stat-icon bg-success bg-opacity-10 text-success">
                        <i class='bx bx-transfer'></i>
                    </div>
                    <div>
                        <h3 class="mb-0" id="statExchanges">0</h3>
                        <p class="text-muted mb-0 small">Completed Exchanges</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="admin-stat">
                    <div class="admin-stat-icon bg-warning bg-opacity-10 text-warning">
                        <i class='bx bx-receipt'></i>
                    </div>
                    <div>
                        <h3 class="mb-0" id="statPending">0</h3>
                        <p class="text-muted mb-0 small">Pending Requests</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Management Tabs -->
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-medium text-danger" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button" role="tab" aria-selected="true">
                    Manage Users
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-medium text-danger" id="books-tab" data-bs-toggle="tab" data-bs-target="#books" type="button" role="tab" aria-selected="false">
                    Manage Books
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Users Tab -->
            <div class="tab-pane fade show active" id="users" role="tabpanel" tabindex="0">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0 table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Joined</th>
                                        <th>Role</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Books Tab -->
            <div class="tab-pane fade" id="books" role="tabpanel" tabindex="0">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0 table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Title</th>
                                        <th>Author</th>
                                        <th>Owner ID</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="booksTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/books.js"></script>
    <script src="js/exchange.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/ui.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.requireAdmin();

            const renderAdminDash = () => {
                const stats = Admin.getStats();
                document.getElementById('statUsers').textContent = stats.totalUsers;
                document.getElementById('statBooks').textContent = stats.totalBooks;
                document.getElementById('statExchanges').textContent = stats.totalExchanges;
                document.getElementById('statPending').textContent = stats.pendingRequests;

                // Render Users
                const usersBody = document.getElementById('usersTableBody');
                usersBody.innerHTML = '';
                const allUsers = Admin.getAllUsers().sort((a,b) => new Date(b.joinedDate) - new Date(a.joinedDate));

                allUsers.forEach(u => {
                    usersBody.innerHTML += `
                        <tr>
                            <td><small class="text-muted">${u.id.substring(0,8)}</small></td>
                            <td><div class="fw-medium">${u.name}</div></td>
                            <td>${u.email}</td>
                            <td>${new Date(u.joinedDate).toLocaleDateString()}</td>
                            <td><span class="badge bg-${u.role === 'admin' ? 'danger' : 'primary'}">${u.role}</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-danger delete-user-btn" data-id="${u.id}" ${u.role === 'admin' ? 'disabled' : ''}>
                                    <i class='bx bx-trash'></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });

                // Render Books
                const booksBody = document.getElementById('booksTableBody');
                booksBody.innerHTML = '';
                const allBooks = Books.getAll().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

                allBooks.forEach(b => {
                    booksBody.innerHTML += `
                        <tr>
                            <td><div class="fw-medium">${b.title}</div></td>
                            <td>${b.author}</td>
                            <td><small class="text-muted" title="${b.ownerId}">${b.ownerId.substring(0,8)}</small></td>
                            <td><span class="badge bg-${b.status === 'available' ? 'success' : 'secondary'}">${b.status}</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-danger delete-book-btn" data-id="${b.id}">
                                    <i class='bx bx-trash'></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });

                attachListeners();
            };

            const attachListeners = () => {
                document.querySelectorAll('.delete-user-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        if(confirm('WARNING: This will permanently delete the user and ALL their books and requests. Continue?')) {
                            const res = Admin.deleteUser(id);
                            if(res.success) {
                                UI.showToast('Deleted', res.message, 'success');
                                renderAdminDash();
                            } else UI.showToast('Error', res.message, 'danger');
                        }
                    });
                });

                document.querySelectorAll('.delete-book-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        if(confirm('WARNING: Administrative forced deletion. This will also delete related requests. Continue?')) {
                            // Using a private method bypass for Admin, but Books.delete already checks if currentUser is Admin
                            const res = Admin.deleteBook(id);
                            if(res.success) {
                                UI.showToast('Deleted', res.message, 'success');
                                renderAdminDash();
                            } else UI.showToast('Error', res.message, 'danger');
                        }
                    });
                });
            };

            renderAdminDash();
        });
    </script>
</body>
</html>
